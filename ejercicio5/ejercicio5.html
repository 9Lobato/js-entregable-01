<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JS entrega ejercicio5</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 0;
    }
    h1 {
      color: #333;
    }
    input {
      text-align: right;
      width: 95px;
    }
    button {
      background-color: #888;
      border: 0;
      color: white;
      width: 22px;
      height: 22px;
    }
    button.active {
      background-color: #333;
    }
    #index {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 16px;
      text-decoration: none;
      color: #888;
    }
    #index:hover {
      color:black;
    }
  </style>
</head>
<body>
  <h1>Calculadora sencilla</h1>
  <form id="calculadora">
    <input id="a" type="number">
    <button id="suma" type="button">+</button>
    <button id="resta" type="button">-</button>
    <button id="multi" type="button">x</button>
    <button id="divi" type="button">/</button>
    <input id="b" type="number">
    <span> = </span>
    <output id="resultado" name="resultado" for="a b"></output>
  </form>
  <a id="index" href="../index.html">⬅ Index</a>
  <script src="ejercicio5.js"></script>
</body>
</html>
