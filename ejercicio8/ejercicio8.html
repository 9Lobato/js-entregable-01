<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JS entrega ejercicio8</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 0;
    }
    h1 {
      color: #333;
    }
    textarea {
      font-size: 16px;
    }
    #index {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 16px;
      text-decoration: none;
      color: #888;
    }
    #index:hover {
      color:black;
    }
  </style>
</head>
<body>
  <h1>Contador de palabras y caracteres</h1>
  <div>
    <textarea id="text" rows="16" cols="58" placeholder="Escribe un párrafo aquí..."></textarea>
    <p>Número de palabras: <span id="words"></span></p>
    <p>Número de carácteres: <span id="characters"></span></p>
  </div>
  <a id="index" href="../index.html">⬅ Index</a>
  <script src="ejercicio8.js"></script>
</body>
</html>
